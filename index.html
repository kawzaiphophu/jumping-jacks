<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumping Jack Counter</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="video-container">
            <video class="input_video" style="display: none;" autoplay muted playsinline></video>
            <audio id="bgm" src="song.mp3" loop preload="auto"></audio>
            <canvas class="output_canvas" width="1280" height="720"></canvas>
            
            <div class="overlay-card glassmorphism">
                <h1>JUMPING JACKS</h1>
                <div class="counter" id="counter">0</div>
                <div class="state" id="state">STATE: DOWN</div>
                <div class="controls">
                    <button id="reset-btn">Reset</button>
                    <button id="toggle-video-btn">Hide Video</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
